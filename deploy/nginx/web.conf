# /etc/nginx/sites-available/web
# Public site (Astro static build). Served on :80 (or :443 after certbot).
server {
    listen 80;
    server_name example.com www.example.com;

    root /var/www/proxy-ip/web/dist;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets aggressively
    location ~* \.(?:css|js|svg|woff2?|ico|png|jpe?g|gif|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # SPA-style fallback for Astro
    location / {
        try_files $uri $uri/ /index.html;
    }
}
