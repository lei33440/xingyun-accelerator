# /etc/nginx/sites-available/cms
# Strapi admin + API. Listening ONLY on 127.0.0.1:1338, fronted by Cloudflare
# (DNS only / grey cloud, with Zero Trust or IP allowlist in front).
server {
    listen 127.0.0.1:1338;
    server_name cms-9f3a2b.example.com;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
